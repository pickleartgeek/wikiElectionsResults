<!DOCTYPE html><html>
<head>
  <meta charset="utf-8" />
  <title>Election Map Improved</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin:0; display:flex; font-family:Segoe UI, sans-serif; }#map { width:68%; height:100vh; }

#sidebar {
  width:32%;
  padding:15px;
  overflow:auto;
  background:#ffffff;
  box-shadow:-2px 0 8px rgba(0,0,0,0.1);
}

h2 { margin-top:0; }

.race-btn {
  display:inline-block;
  margin:4px;
  padding:8px 12px;
  background:#eee;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}

.race-btn.active { background:#333; color:#fff; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:14px;
}

th, td {
  padding:8px;
  border-bottom:1px solid #eee;
}

.leader {
  font-weight:bold;
  color:green;
}

.progress-wrap {
  margin:10px 0;
}

.bar-container {
  width:100%;
  height:14px;
  background:#eee;
  border-radius:8px;
  overflow:hidden;
}

.bar {
  height:100%;
  background:#4caf50;
}

.candidate-box {
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-radius:6px;
  margin-bottom:4px;
}

  </style>
</head>
<body><div id="map"></div><div id="sidebar">
  <h2>Election Results</h2>
  <div id="raceButtons"></div>  <div class="progress-wrap" id="completion"></div>  <div id="resultsTable"></div>
</div><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script>
const partyColors = {
  wc:"#2171b5",
  qtw:"#b71212",
  rf:"#b71212",
  gsx:"#691391",
  dvwb:"#F0B27A"
};

const partyNames = {
  wc:"Worth-Cupcake",
  qtw:"TyroniusTheIII",
  rf:"Representative-Fee65",
  gsx:"gunsmokexeon",
  dvwb:"Disguised_VW_Beetle"
};

let map = L.map('map').setView([40, -95], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let geoLayer;
let resultsData;
let currentRace;

let turnout = 65;
let reporting = 80;

fetch('geo.json')
  .then(res => res.json())
  .then(geojson => {
    geoLayer = L.geoJSON(geojson, {
      style: styleFeature,
      onEachFeature: (feature, layer) => {
        layer.on('click', () => showDistrict(feature.properties.id));
        layer.bindTooltip("District " + feature.properties.id);
      }
    }).addTo(map);

    map.fitBounds(geoLayer.getBounds());
  });

fetch('results.json')
  .then(res => res.json())
  .then(data => {
    resultsData = data;
    initUI();
  });

function initUI() {
  const container = document.getElementById('raceButtons');

  Object.keys(resultsData).forEach(race => {
    const btn = document.createElement('div');
    btn.className = 'race-btn';
    btn.innerText = race;

    btn.onclick = () => {
      document.querySelectorAll('.race-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentRace = race;
      geoLayer.setStyle(styleFeature);
      updateTotals();
    };

    container.appendChild(btn);
  });

  updateCompletion();
}

function styleFeature(feature) {
  if (!currentRace || !resultsData) {
    return { color:'#444', weight:2, fillOpacity:0.1 };
  }

  const id = feature.properties.id;
  const data = resultsData[currentRace][id];

  if (!data) {
    return { color:'#444', weight:2, fillOpacity:0.1 };
  }

  let sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  let winner = sorted[0];

  return {
    fillColor: partyColors[winner[0]] || '#ccc',
    fillOpacity: 0.75,
    color:'#000',
    weight:2
  };
}

function showDistrict(id) {
  if (!currentRace) return;

  const data = resultsData[currentRace][id];
  if (!data) return;

  let total = Object.values(data).reduce((a,b)=>a+b,0);

  let html = `<h3>District ${id}</h3>`;

  Object.entries(data)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([k,v], i) => {
      let percent = total ? ((v/total)*100).toFixed(1) : 0;

      html += `
        <div class="candidate-box" style="background:${i===0 ? '#e8f5e9' : '#f5f5f5'}">
          <span style="color:${partyColors[k]}">${partyNames[k]}</span>
          <span>${v} (${percent}%)</span>
        </div>
      `;
    });

  document.getElementById('resultsTable').innerHTML = html;
}

function updateTotals() {
  const raceData = resultsData[currentRace];

  let totals = {};

  Object.values(raceData).forEach(d => {
    Object.entries(d).forEach(([k,v]) => {
      totals[k] = (totals[k] || 0) + v;
    });
  });

  let sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  let totalVotes = Object.values(totals).reduce((a,b)=>a+b,0);

  let html = `<h3>${currentRace} Overview</h3>`;

  sorted.forEach(([k,v], i) => {
    let percent = totalVotes ? ((v/totalVotes)*100).toFixed(1) : 0;

    html += `
      <div class="candidate-box" style="background:${i===0 ? '#e8f5e9' : '#f5f5f5'}">
        <span style="color:${partyColors[k]}">${partyNames[k]}</span>
        <span>${v} (${percent}%) ${i===0 ? '✔' : ''}</span>
      </div>
    `;
  });

  document.getElementById('resultsTable').innerHTML = html;
}

function updateCompletion() {
  document.getElementById('completion').innerHTML = `
    <div><strong>Turnout:</strong> ${turnout}%</div>
    <div><strong>Reporting:</strong> ${reporting}%</div>
    <div class="bar-container">
      <div class="bar" style="width:${reporting}%"></div>
    </div>
  `;
}

</script></body>
</html>
